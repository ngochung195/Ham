<body>

    <h2>Tính Giai Thừa (Đệ Quy)</h2>
    <label for="numberInput">Nhập số nguyên n (n >= 0):</label>
    <input type="number" id="numberInput" placeholder="Nhập số..." min="0">
    <button onclick="hienThiGiaiThua()">Tính Giai Thừa</button>

    <p><strong>Kết quả:</strong> <span id="result">Chưa có dữ liệu</span></p>

    <script>
        function tinhGiaiThua(n) {
            if (n === 0 || n === 1) return 1;
            return n * tinhGiaiThua(n - 1);
        }

        function hienThiGiaiThua() {
            let input = document.getElementById('numberInput');
            let ketQua = document.getElementById('result');
            let n = Number(input.value);

            if (input.value === "" || n < 0 || !Number.isInteger(n)) {
                alert("Vui lòng nhập một số nguyên lớn hơn hoặc bằng 0!");
                return;
            }

            let result = tinhGiaiThua(n);
            ketQua.innerText = `${n}! = ${result}`;
        }
    </script>

</body>
