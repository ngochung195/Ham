<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Kiểm tra và Liệt kê Số Nguyên Tố</title>
</head>

<body>

    <h2>Kiểm tra số nguyên tố</h2>
    <label for="numberInput">Nhập một số:</label>
    <input type="number" id="numberInput" placeholder="Nhập số cần kiểm tra...">
    <button onclick="checkPrime()">Kiểm tra</button>

    <p><strong>Kết quả:</strong> <span id="checkResult">Chưa có dữ liệu</span></p>

    <hr>

    <h2>Danh sách số nguyên tố dưới 10,000</h2>
    <button onclick="listPrimes()">Hiển thị danh sách</button>

    <p><strong>Tổng số tìm được:</strong> <span id="primeCount">0</span></p>
    <p style="word-wrap: break-word;" id="primeList"></p>

    <script>
        function isPrime(n) {
            if (n <= 1) return false;
            for (let i = 2; i * i <= n; i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function checkPrime() {
            const inputVal = document.getElementById('numberInput').value;
            let ketQua = document.getElementById('checkResult');

            if (inputVal === "") {
                ketQua.innerText = "Vui lòng nhập một số hợp lệ!";
                return;
            }

            const num = Number(inputVal);

            if (isPrime(num)) {
                ketQua.innerText = num + " Là số nguyên tố";
            } else {
                ketQua.innerText = num + " Không là số nguyên tố";
            }
        }

        function listPrimes() {
            let primes = [];
            for (let i = 2; i < 10000; i++) {
                if (isPrime(i)) {
                    primes.push(i);
                }
            }

            document.getElementById("primeCount").innerText = primes.length;
            document.getElementById("primeList").innerText = primes.join(", ");
        }
    </script>

</body>

</html>
